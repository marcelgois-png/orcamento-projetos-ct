<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar Usuário – IRP CT/UFPB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
  <style>
    body, input, button, label, p, h1, h2, h3, a {
      font-family: 'Open Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="text-center mb-4">
        <img src="/static/img/logo_ct.png" alt="CT/UFPB" style="height:80px; width:auto;" class="mb-3">
        <h1 class="h5 fw-bold" style="color:var(--ct-primary)">IRP – CT/UFPB</h1>
        <p class="text-muted small">Intenções de Registro de Preço</p>
      </div>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="h6 fw-bold mb-1">Recuperar usuário</h2>
          <p class="text-muted small mb-4">Informe seu e-mail cadastrado e enviaremos seu nome de usuário.</p>

          {% if mensagem %}
          <div class="alert alert-success small">{{ mensagem }}</div>
          {% endif %}
          {% if erro %}
          <div class="alert alert-danger small">{{ erro }}</div>
          {% endif %}

          {% if not mensagem %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">E-mail cadastrado</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control"
                       placeholder="seu@email.com" autofocus required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">
              <i class="bi bi-send me-1"></i> Enviar
            </button>
          </form>
          {% endif %}
        </div>
      </div>

      <p class="text-center text-muted small mt-3">
        <a href="{% url 'login' %}" class="text-decoration-none">
          <i class="bi bi-arrow-left"></i> Voltar ao login
        </a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
