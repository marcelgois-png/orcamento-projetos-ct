{% extends 'base.html' %}
{% block title %}Alterar Senha – IRP CT/UFPB{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white fw-bold">
        <i class="bi bi-key me-1"></i> Alterar Senha
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            <input type="password" name="{{ field.html_name }}" class="form-control {% if field.errors %}is-invalid{% endif %}">
            {% for err in field.errors %}<div class="invalid-feedback">{{ err }}</div>{% endfor %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100">Salvar nova senha</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
